<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0);    }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.45; }
        50%       { opacity: 1;   }
      }
      @keyframes shimmer {
        0%   { transform: translateX(0px);    }
        100% { transform: translateX(1200px); }
      }
      @keyframes circuitIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      .name    { animation: fadeUp   0.9s ease 0.2s both; }
      .sub     { animation: fadeUp   0.9s ease 0.7s both; }
      .sep     { animation: fadeUp   0.9s ease 1.0s both; }
      .circuit { animation: circuitIn 2s ease 0.8s both; }
      .node    { animation: pulse   2.5s ease-in-out infinite; }
      .shimmer-wrap { animation: shimmer 4.5s linear 1.8s infinite; }
    </style>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#090118"/>
      <stop offset="55%"  stop-color="#06114d"/>
      <stop offset="100%" stop-color="#162447"/>
    </linearGradient>

    <!-- Name text gradient: cyan → near-white → violet -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="48%"  stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>

    <!-- Separator line gradient -->
    <linearGradient id="sepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00e5ff" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#7c4dff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
    </linearGradient>

    <!-- Shimmer gradient (applied to sweeping rect) -->
    <linearGradient id="shimmerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow for name -->
    <filter id="nameGlow" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0
                0 0.9 1 0 0.55
                0 0 0 0 1
                0 0 0 0.65 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for subtitle -->
    <filter id="subGlow" x="-5%" y="-60%" width="110%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Node glow -->
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip shimmer to name area only -->
    <clipPath id="nameClip">
      <rect x="165" y="100" width="570" height="95"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="900" height="280" rx="10" fill="url(#bg)"/>

  <!-- Edge accent lines -->
  <rect width="900" height="2" rx="1" fill="#00e5ff" opacity="0.55"/>
  <rect x="0" y="278" width="900" height="2" rx="1" fill="#7c4dff" opacity="0.35"/>

  <!-- ── LEFT CIRCUIT TRACES ── -->
  <g class="circuit" stroke="#00e5ff" stroke-width="1.1" fill="none">
    <polyline points="0,140  52,140  78,114  148,114" opacity="0.28"/>
    <polyline points="52,140 52,82  108,82"             opacity="0.22"/>
    <polyline points="0,166  34,166  60,192  148,192"  opacity="0.18"/>
    <line x1="108" y1="82" x2="108" y2="48"            opacity="0.14"/>
  </g>
  <g class="circuit" fill="#00e5ff" filter="url(#nodeGlow)">
    <circle cx="52"  cy="140" r="3.5" opacity="0.85" class="node"/>
    <circle cx="78"  cy="114" r="2.5" opacity="0.70" class="node" style="animation-delay:.5s"/>
    <circle cx="148" cy="114" r="2"   opacity="0.55" class="node" style="animation-delay:1s"/>
    <circle cx="52"  cy="82"  r="2"   opacity="0.50" class="node" style="animation-delay:1.5s"/>
    <circle cx="108" cy="48"  r="1.5" opacity="0.40" class="node" style="animation-delay:2s"/>
  </g>

  <!-- ── RIGHT CIRCUIT TRACES ── -->
  <g class="circuit" stroke="#7c4dff" stroke-width="1.1" fill="none">
    <polyline points="900,140  848,140  822,114  752,114" opacity="0.28"/>
    <polyline points="848,140  848,82   792,82"            opacity="0.22"/>
    <polyline points="900,166  866,166  840,192  752,192" opacity="0.18"/>
    <line x1="792" y1="82" x2="792" y2="48"              opacity="0.14"/>
  </g>
  <g class="circuit" fill="#7c4dff" filter="url(#nodeGlow)">
    <circle cx="848" cy="140" r="3.5" opacity="0.85" class="node" style="animation-delay:.3s"/>
    <circle cx="822" cy="114" r="2.5" opacity="0.70" class="node" style="animation-delay:.8s"/>
    <circle cx="752" cy="114" r="2"   opacity="0.55" class="node" style="animation-delay:1.3s"/>
    <circle cx="848" cy="82"  r="2"   opacity="0.50" class="node" style="animation-delay:1.8s"/>
    <circle cx="792" cy="48"  r="1.5" opacity="0.40" class="node" style="animation-delay:2.3s"/>
  </g>

  <!-- ── BACKGROUND PARTICLES ── -->
  <g fill="#00e5ff">
    <circle cx="22"  cy="22"  r="1.5" opacity="0.40" class="node" style="animation-delay:0s"/>
    <circle cx="195" cy="16"  r="1"   opacity="0.30" class="node" style="animation-delay:.6s"/>
    <circle cx="345" cy="28"  r="1.5" opacity="0.35" class="node" style="animation-delay:1.3s"/>
    <circle cx="455" cy="14"  r="1"   opacity="0.25" class="node" style="animation-delay:.9s"/>
    <circle cx="558" cy="24"  r="1"   opacity="0.30" class="node" style="animation-delay:.3s"/>
    <circle cx="705" cy="32"  r="1.5" opacity="0.38" class="node" style="animation-delay:1.1s"/>
    <circle cx="878" cy="18"  r="1"   opacity="0.32" class="node" style="animation-delay:1.7s"/>
    <circle cx="22"  cy="256" r="1.5" opacity="0.35" class="node" style="animation-delay:.4s"/>
    <circle cx="450" cy="264" r="1"   opacity="0.28" class="node" style="animation-delay:1.2s"/>
    <circle cx="878" cy="258" r="1.5" opacity="0.38" class="node" style="animation-delay:.8s"/>
  </g>

  <!-- ── SEPARATOR ABOVE NAME ── -->
  <rect x="175" y="104" width="550" height="1" fill="url(#sepGrad)" class="sep"/>

  <!-- ── NAME TEXT ── -->
  <text
    x="450" y="176"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="82"
    font-weight="900"
    letter-spacing="16"
    text-anchor="middle"
    fill="url(#nameGrad)"
    filter="url(#nameGlow)"
    class="name"
  >PRANAV</text>

  <!-- ── SHIMMER SWEEP ── -->
  <g clip-path="url(#nameClip)" class="shimmer-wrap">
    <rect x="-300" y="100" width="300" height="95" fill="url(#shimmerGrad)"/>
  </g>

  <!-- ── SEPARATOR BELOW NAME ── -->
  <rect x="175" y="193" width="550" height="1" fill="url(#sepGrad)" class="sep"/>

  <!-- ── SUBTITLE ── -->
  <text
    x="450" y="230"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="15.5"
    letter-spacing="3.5"
    text-anchor="middle"
    fill="#90caf9"
    filter="url(#subGlow)"
    class="sub"
  >M.S. ECE  @  UC DAVIS  ·  AI  ·  ROBOTICS  ·  EMBEDDED SYSTEMS</text>

</svg>
